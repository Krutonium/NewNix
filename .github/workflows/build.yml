name: Build NixOS Configurations

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Install attic client
        run: nix profile install nixpkgs#attic-client

      - name: Login to Attic
        run: attic login KruCache https://cache.krutonium.ca ${{ secrets.ATTIC_TOKEN }}

      - name: Build and push all configurations
        run: |
          nix flake show --json 2>/dev/null \
            | jq -r '.nixosConfigurations | keys[]' \
            | while read host; do
                echo "Building $host..."
                nix build .#nixosConfigurations.$host.config.system.build.toplevel \
                  --no-link --print-out-paths
              done \
            | attic push KruCache -